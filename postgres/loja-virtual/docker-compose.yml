services:
  database:
    image: postgres:18-alpine
    container_name: sctec-loja-virtual
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: loja-virtual
    ports:
      - "5432:5432"
    volumes:
      - loja-virtual:/var/lib/postgresql/18/data

volumes:
  loja-virtual: